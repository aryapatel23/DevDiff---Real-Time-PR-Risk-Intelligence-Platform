version: '3.8'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - devdiff_data:/app/data
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=4000
      - DB_PATH=/app/data/devdiff.db
      - ML_MODEL_PATH=/app/ml/model.pkl
      - CONFIDENCE_THRESHOLD=75
      - NODE_ENV=production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_WS_URL=ws://localhost:4000
    depends_on:
      - backend

volumes:
  devdiff_data:
